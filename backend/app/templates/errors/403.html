<!DOCTYPE html>
<html lang="{{ current_lang }}" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _("权限不足") }} - {{ _("电商运营平台") }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ root_path }}/static/style.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-body); margin: 0; padding: 24px; }
        .error-container { text-align: center; max-width: 480px; }
        .error-code { font-size: 96px; font-weight: 800; background: linear-gradient(135deg, var(--gold), var(--amber)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 8px; }
        .error-icon { font-size: 48px; color: var(--text-muted); margin-bottom: 16px; }
        .error-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
        .error-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
        .error-actions { display: flex; gap: 12px; justify-content: center; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon"><i class="bi bi-shield-exclamation"></i></div>
        <div class="error-code">403</div>
        <div class="error-title">{{ _("权限不足") }}</div>
        <div class="error-desc">{{ _("抱歉，您没有权限访问此页面。") }}<br>{{ _("请联系管理员确认账号权限。") }}</div>
        <div class="error-actions">
            <a href="{{ root_path }}/" class="btn-custom btn-custom-primary btn-custom-lg"><i class="bi bi-house"></i> {{ _("返回首页") }}</a>
            <a href="{{ root_path }}/login" class="btn-custom btn-custom-outline btn-custom-lg"><i class="bi bi-box-arrow-in-right"></i> {{ _("重新登录") }}</a>
        </div>
    </div>
</body>
</html>
