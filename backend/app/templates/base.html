<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}电商运营平台{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Mobile Overlay -->
    <div class="mobile-sidebar-overlay" id="mobileSidebarOverlay"></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="app-layout">
        <!-- ===== Sidebar ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="bi bi-shop"></i></div>
                <span class="brand-text">电商运营</span>
            </div>

            <div class="sidebar-divider"><span>概览</span></div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="/" class="nav-link" data-page="dashboard">
                        <span class="nav-icon"><i class="bi bi-grid-1x2"></i></span>
                        <span class="nav-text">数据看板</span>
                    </a>
                    <a href="/orders" class="nav-link" data-page="orders">
                        <span class="nav-icon"><i class="bi bi-receipt"></i></span>
                        <span class="nav-text">订单管理</span>
                        <span class="nav-badge" id="orderBadge">0</span>
                    </a>
                </div>

                <div class="sidebar-divider"><span>分析</span></div>
                <div class="nav-section">
                    <a href="/sales" class="nav-link" data-page="sales">
                        <span class="nav-icon"><i class="bi bi-graph-up-arrow"></i></span>
                        <span class="nav-text">销售分析</span>
                    </a>
                    <a href="/inventory" class="nav-link" data-page="inventory">
                        <span class="nav-icon"><i class="bi bi-box-seam"></i></span>
                        <span class="nav-text">库存管理</span>
                    </a>
                </div>

                <div class="sidebar-divider"><span>管理</span></div>
                <div class="nav-section">
                    <a href="/stores" class="nav-link" data-page="stores">
                        <span class="nav-icon"><i class="bi bi-shop-window"></i></span>
                        <span class="nav-text">店铺管理</span>
                    </a>
                    <a href="/automation" class="nav-link" data-page="automation">
                        <span class="nav-icon"><i class="bi bi-lightning-charge"></i></span>
                        <span class="nav-text">自动化规则</span>
                    </a>
                    <a href="/product-selections" class="nav-link" data-page="product-selections">
                        <span class="nav-icon"><i class="bi bi-star"></i></span>
                        <span class="nav-text">捕获选品</span>
                    </a>
                    <a href="/auto-reply" class="nav-link" data-page="auto-reply">
                        <span class="nav-icon"><i class="bi bi-chat-dots"></i></span>
                        <span class="nav-text">自动化客服</span>
                    </a>
                    <a href="/suggestions" class="nav-link" data-page="suggestions">
                        <span class="nav-icon"><i class="bi bi-lightbulb"></i></span>
                        <span class="nav-text">运营建议</span>
                    </a>
                    <a href="/retrospectives" class="nav-link" data-page="retrospectives">
                        <span class="nav-icon"><i class="bi bi-clock-history"></i></span>
                        <span class="nav-text">复盘分析</span>
                    </a>
                </div>

                <div class="sidebar-divider"><span>系统</span></div>
                <div class="nav-section">
                    <a href="/settings" class="nav-link" data-page="settings">
                        <span class="nav-icon"><i class="bi bi-gear"></i></span>
                        <span class="nav-text">系统设置</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="nav-link" onclick="toggleSidebar()">
                    <span class="nav-icon"><i class="bi bi-chevron-left"></i></span>
                    <span class="nav-text">收起侧栏</span>
                </div>
            </div>
        </aside>

        <!-- ===== Main Area ===== -->
        <div class="main-area">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="topbar-btn d-md-none" onclick="toggleMobileSidebar()">
                        <i class="bi bi-list"></i>
                    </button>
                    <div>
                        <h1 class="page-title">{% block page_title %}数据看板{% endblock %}</h1>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb">
                                {% block breadcrumb %}
                                <li class="breadcrumb-item"><a href="/">首页</a></li>
                                <li class="breadcrumb-item active">数据看板</li>
                                {% endblock %}
                            </ol>
                        </nav>
                    </div>
                </div>
                <div class="topbar-right">
                    <button class="topbar-btn" onclick="toggleDarkMode()" title="切换主题">
                        <i class="bi bi-moon-stars" id="themeIcon"></i>
                    </button>
                    <button class="topbar-btn" onclick="triggerRefresh()" title="刷新数据">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                    <span class="text-muted text-xs" id="updateTime">--</span>
                </div>
            </header>

            <!-- Content -->
            <main class="content-area">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="/static/app.js"></script>
    <script>
        // Highlight active menu
        document.querySelectorAll('.nav-link[data-page]').forEach(el => {
            if (el.getAttribute('href') === location.pathname) {
                el.classList.add('active');
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
