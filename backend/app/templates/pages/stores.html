{% extends "base.html" %}
{% block title %}店铺管理 - 电商运营平台{% endblock %}
{% block page_title %}店铺管理{% endblock %}
{% block breadcrumb %}
<li class="breadcrumb-item"><a href="/">首页</a></li>
<li class="breadcrumb-item active">店铺管理</li>
{% endblock %}

{% block content %}
<body data-page="stores">
<!-- Actions -->
<div class="mb-4">
    <button class="btn-custom btn-custom-primary" data-bs-toggle="modal" data-bs-target="#addStoreModal">
        <i class="bi bi-plus-circle"></i>添加店铺
    </button>
</div>

<!-- Store List -->
<div class="card-custom">
    <div class="card-header">
        <span class="card-title"><i class="bi bi-shop-window text-primary"></i>已接入店铺</span>
    </div>
    <div class="card-body p-0">
        <div class="table-container">
            <table class="table-custom">
                <thead>
                    <tr>
                        <th>店铺名称</th>
                        <th>平台</th>
                        <th>地址</th>
                        <th style="width:80px">状态</th>
                        <th style="width:120px">操作</th>
                    </tr>
                </thead>
                <tbody id="storesTableBody">
                    <tr><td colspan="5"><div class="empty-state"><div class="empty-title">加载中...</div></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Store Modal -->
<div class="modal fade" id="addStoreModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="border:none;border-radius:var(--radius-lg);">
            <div class="modal-header" style="border:none;padding:24px 24px 0;">
                <h5 class="fw-bold"><i class="bi bi-plus-circle me-2 text-primary"></i>添加店铺</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="padding:20px 24px;">
                <form id="addStoreForm">
                    <div class="form-group">
                        <label class="form-label">店铺名称</label>
                        <input type="text" class="form-custom" id="storeName" placeholder="如：我的淘宝店">
                    </div>
                    <div class="form-group">
                        <label class="form-label">平台类型</label>
                        <select class="form-custom" id="storePlatform">
                            <option value="taobao">淘宝</option>
                            <option value="shopify">Shopify</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">店铺地址</label>
                        <input type="text" class="form-custom" id="storeUrl" placeholder="淘宝卖家昵称 / Shopify 店铺域名">
                        <div class="form-hint">淘宝填卖家昵称，Shopify 填店铺域名</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">App Key</label>
                        <input type="text" class="form-custom" id="storeKey" placeholder="淘宝 App Key / Shopify API Key">
                    </div>
                    <div class="form-group">
                        <label class="form-label">App Secret</label>
                        <input type="password" class="form-custom" id="storeSecret" placeholder="淘宝 App Secret / Shopify Access Token">
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="border:none;padding:0 24px 20px;">
                <button type="button" class="btn-custom btn-custom-outline" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn-custom btn-custom-primary" onclick="addStore()">确认添加</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
