<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130" width="400" height="130">
  <defs>
    <linearGradient id="ringDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="ringMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="ringLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="ringAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- ===== LOGO MARK ===== -->
  <g transform="translate(12, 12)">
    <!-- Outermost ring → sweeping arc from upper-right to lower-left -->
    <path d="M 62 6
             A 58 58 0 1 1 8 58"
          fill="none" stroke="url(#ringDeep)" stroke-width="5" stroke-linecap="round"/>

    <!-- Middle ring → offset arc, shorter sweep -->
    <path d="M 54 16
             A 46 46 0 1 1 14 56"
          fill="none" stroke="url(#ringMid)" stroke-width="4" stroke-linecap="round"/>

    <!-- Inner ring → smallest arc, innermost growth ring -->
    <path d="M 44 26
             A 30 30 0 0 1 20 44"
          fill="none" stroke="url(#ringLight)" stroke-width="3" stroke-linecap="round"/>

    <!-- Central seed dot -->
    <circle cx="32" cy="34" r="3.5" fill="url(#ringLight)"/>

    <!-- Broken fragment → a piece of the outer ring, displaced and rotated -->
    <path d="M 10 95
             A 52 52 0 0 0 38 105"
          fill="none" stroke="url(#ringAccent)" stroke-width="4.5" stroke-linecap="round"
          transform="translate(14, -12) rotate(18, 24, 100)"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text x="100" y="108"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="54" font-weight="275" fill="#0F172A" letter-spacing="5">cello</text>
</svg>
