<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ringDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="ringMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="ringLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="ringAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Outermost growth ring -->
  <path d="M 160 52
           A 72 72 0 1 1 36 72"
        fill="none" stroke="url(#ringDeep)" stroke-width="7" stroke-linecap="round"/>

  <!-- Middle growth ring -->
  <path d="M 148 62
           A 58 58 0 1 1 44 70"
        fill="none" stroke="url(#ringMid)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Inner growth ring -->
  <path d="M 132 74
           A 38 38 0 0 1 60 70"
        fill="none" stroke="url(#ringLight)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Central seed -->
  <circle cx="100" cy="66" r="5" fill="url(#ringLight)"/>

  <!-- Broken fragment -->
  <path d="M 30 130
           A 66 66 0 0 0 62 147"
        fill="none" stroke="url(#ringAccent)" stroke-width="6" stroke-linecap="round"
        transform="translate(18, -18) rotate(22, 46, 138)"/>
</svg>
