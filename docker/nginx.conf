# Nginx 安全加固配置
# 限流定义（在全局限流中启用）
limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;

server {
    listen 80;
    listen 8000;
    listen 18080;
    server_name hscuuhgctunneld.top localhost;

    # 隐藏 nginx 版本号
    server_tokens off;

    # 请求体大小限制（与后端一致）
    client_max_body_size 5m;

    # 安全响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 限制 HTTP 方法（API 只允许常用方法）
    if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS)$) {
        return 405;
    }

    # API 请求 — 启用限流（每 IP 每分钟 120 次请求）
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查
    location /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
    }

    # 静态文件（关闭 access log、强缓存）
    location /static/ {
        proxy_pass http://api:8000/static/;
        proxy_set_header Host $host;
        access_log off;
        expires 7d;
    }

    # 前端页面
    location / {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
