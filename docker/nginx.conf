# Nginx 安全加固配置
# 限流定义（在全局限流中启用）
limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;

server {
    listen 80;
    server_name hscuuhgctunneld.top localhost;

    # 隐藏 nginx 版本号
    server_tokens off;

    # 请求体大小限制（与后端一致）
    client_max_body_size 5m;

    # 安全响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === 健康检查（根路径，供 Docker/云平台监控使用） ===
    location /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
    }

    # === Cello 项目（子路径部署，为多项目预留根域名） ===
    location /cello/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === 默认根路径 — 返回简单页面，不占用域名根 ===
    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>E-Commerce Ops Platform</title>
<style>body{font-family:-apple-system,sans-serif;display:flex;height:100vh;align-items:center;justify-content:center;background:#f8fafc;color:#334155;margin:0}
.container{text-align:center}.links{margin-top:24px}.links a{display:inline-block;padding:10px 24px;background:#2563eb;color:#fff;text-decoration:none;border-radius:8px;font-size:14px}</style>
</head>
<body><div class="container">
<h1 style="font-weight:300;font-size:28px;letter-spacing:2px">cello</h1>
<p style="color:#94a3b8;margin-top:8px">E-Commerce Operations Platform</p>
<div class="links"><a href="/cello/">进入平台</a></div>
</div></body></html>';
    }
}
